<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>읽고 말하기 - 빠질 때가 됐어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../../style.css">
  <script src="../../../script.js" defer></script>
</head>
<body>
  <div class="clouds"><span class="cloud one"></span><span class="cloud two"></span></div>
  <div class="page-shell">
    <header class="brand">
      <a class="brand-mark" href="../../../">
        <img src="../../../shared/images/yeni-teacher.png" alt="여니쌤 캐릭터">
        <span>수다쟁이 여니쌤의 뿜뿜 놀이터</span>
      </a>
      <button class="malangi-helper" type="button" data-malangi-message="먼저 듣고 천천히 따라 해 봐." aria-label="말랑이 도움말 듣기">
        <span class="helper-bubble" aria-hidden="true"></span>
        <span class="helper-text">도움이 필요하면 눌러줘</span>
      </button>
    </header>
    <main class="main">
      <nav class="book-nav" aria-label="이동">
        <a class="back-link" href="../">책 활동 홈</a>
        <a class="back-link" href="../../../playgrounds/book/">책 놀이터로</a>
      </nav>
      <section class="section-title activity-list-title">
        <p class="kicker">『빠질 때가 됐어』</p>
        <h1>읽고 말하기</h1>
      </section>
      <section class="activity-list-grid" aria-label="읽고 말하기 활동 목록">
        <a class="activity-list-card live-card" href="../activity/?section=speak&activity=recordWord"><span>🔊</span><strong>단어 듣고 따라 읽기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=speak&activity=recordSentence"><span>📖</span><strong>문장 듣고 따라 읽기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=speak&activity=listenPick"><span>👂</span><strong>듣고 고르기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=speak&activity=recordMind"><span>💬</span><strong>내 생각 말하기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=speak&activity=recordMy"><span>▶️</span><strong>녹음 다시 듣기</strong></a>
      </section>
    </main>
  </div>
</body>
</html>
