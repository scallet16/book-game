-.065em;text-align:center}h2{font-size:clamp(31px,5.2vw,54px);margin:8px 0 14px;line-height:1.15;letter-spacing:-.055em;text-align:center}.sub{font-size:clamp(18px,2.6vw,28px);font-weight:900;color:#5e707a;text-align:center;line-height:1.35;margin:4px 0 12px}button{border:0;border-radius:24px;padding:14px 18px;min-height:64px;font-size:clamp(19px,2.7vw,28px);font-weight:1000;color:var(--ink);background:var(--yellow);box-shadow:0 7px 0 var(--shadow);cursor:pointer;touch-action:manipulation}button:active{transform:translateY(3px);box-shadow:0 3px 0 var(--shadow)}button:disabled{opacity:.65}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;width:min(940px,94vw)}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:min(880px,94vw)}.bigmenu{height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-width:0}.bigmenu .emoji{font-size:42px}.bigmenu .name{font-size:clamp(27px,4.6vw,48px);font-weight:1000;letter-spacing:-.055em}.bigmenu .desc{font-size:clamp(14px,2vw,20px);font-weight:850;color:#65757d;margin-top:6px}.card{width:min(980px,95vw);background:rgba(255,255,255,.96);border:3px solid var(--line);border-radius:30px;padding:16px;box-shadow:0 12px 28px rgba(80,132,150,.10)}.topbar{width:min(980px,95vw);display:flex;gap:10px;align-items:center;margin-bottom:8px}.progress{height:16px;background:#edf7fb;border-radius:999px;overflow:hidden;flex:1}.bar{height:100%;background:var(--accent);width:0;border-radius:999px;transition:.25s}.count{font-size:16px;font-weight:1000;color:#687982;min-width:54px;text-align:right}.soft{background:var(--blue);font-size:19px;min-height:50px;padding:10px 16px}.pink{background:var(--pink)}.green{background:var(--green)}.mint{background:var(--mint2)}.lav{background:var(--lav)}.danger{background:#ff90ad;color:white}.footer{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:10px}.feedback{height:44px;text-align:center;font-size:clamp(22px,3.1vw,34px);font-weight:1000;margin-top:8px}.hero{width:min(1020px,96vw);border-radius:38px;background:white;border:3px solid var(--line);padding:34px 34px;text-align:center;box-shadow:0 14px 28px var(--shadow)}.book-title{font-size:clamp(32px,6vw,64px);font-weight:1000;letter-spacing:-.06em;margin:8px 0}.choice{background:white;border:3px solid var(--line);box-shadow:none;text-align:center;min-height:76px}.choice.correct{background:var(--green);border-color:#9ddfad}.choice.wrong{background:var(--pink);border-color:#ffadc9}.scene{height:150px;display:grid;place-items:center;margin:0 auto 4px}
.icon-road{width:190px;height:136px;background:#555;border-radius:24px;position:relative;overflow:hidden;border-top:42px solid #bfe8ff}.icon-road:before{content:"";position:absolute;left:91px;top:5px;width:8px;height:88px;background:repeating-linear-gradient(#fff 0 14px,transparent 14px 28px)}.car{position:absolute;width:50px;height:34px;border-radius:12px;background:#ffd45a;bottom:13px;left:70px;transition:.25s;box-shadow:0 4px 0 rgba(0,0,0,.12)}.car:after{content:"";position:absolute;right:5px;top:8px;width:13px;height:10px;background:#fff;border-radius:3px}.heart{width:100px;height:90px;position:relative;transform:rotate(-45deg);background:#ffd0df;border-radius:20px;margin-top:28px}.heart:before,.heart:after{content:"";position:absolute;width:100px;height:100px;border-radius:50%;background:#ffd0df}.heart:before{top:-50px;left:0}.heart:after{left:50px;top:0}.moon{width:124px;height:124px;border-radius:50%;background:#f3e8a2;position:relative}.moon:after{content:"";position:absolute;right:4px;top:-2px;width:116px;height:116px;border-radius:50%;background:white}.hole{width:142px;height:80px;border-radius:50%;background:radial-gradient(ellipse,#8799a3 0,#b9cbd2 45%,#e8f2f6 46%,#fff 70%);position:relative}.hole:after{content:"";position:absolute;left:50px;top:-58px;width:40px;height:73px;background:#ffe9a8;border-radius:20px;transform:rotate(10deg)}.water{width:160px;height:110px;background:#cfe8ff;border-radius:32px;position:relative;overflow:hidden}.water:before{content:"";position:absolute;left:-20px;top:26px;width:210px;height:38px;background:white;border-radius:50%;opacity:.65}.energy{width:140px;height:98px;background:#d9e1e6;border-radius:42px 42px 25px 25px;position:relative;transform:rotate(7deg)}.energy:before{content:"";position:absolute;left:42px;top:30px;width:56px;height:15px;border-radius:99px;background:#7f8f98}.energy:after{content:"";position:absolute;left:49px;top:58px;width:42px;height:8px;border-radius:99px;background:#94a1a8}.laugh{width:126px;height:126px;background:#ffe9a8;border-radius:50%;position:relative}.laugh:before{content:"";position:absolute;left:31px;top:41px;width:18px;height:18px;border-radius:50%;background:#556169;box-shadow:47px 0 #556169}.laugh:after{content:"";position:absolute;left:34px;top:76px;width:60px;height:26px;border-radius:0 0 80px 80px;background:#ff91b5}.think{width:145px;height:98px;background:#f5f0ff;border-radius:55px;position:relative;border:5px solid #dcd2fa}.think:after{content:"?";position:absolute;inset:0;display:grid;place-items:center;font-size:68px;font-weight:1000;color:#8b7db9}.wait{width:116px;height:116px;border-radius:50%;background:white;border:9px solid #cfe8ff;position:relative}.wait:before{content:"";position:absolute;left:51px;top:21px;width:8px;height:41px;background:#64757d;border-radius:99px}.wait:after{content:"";position:absolute;left:54px;top:54px;width:38px;height:7px;background:#64757d;border-radius:99px;transform-origin:left;transform:rotate(32deg)}.stick{width:170px;height:150px;position:relative;margin:auto}.stick .head{position:absolute;left:65px;top:4px;width:42px;height:42px;border-radius:50%;background:#ffe8a8;border:4px solid #58666e}.stick .body{position:absolute;left:83px;top:45px;width:7px;height:50px;background:#58666e;border-radius:99px}.stick .arm{position:absolute;left:42px;top:58px;width:86px;height:7px;background:#58666e;border-radius:99px;transform:rotate(var(--a,0deg))}.stick .leg1,.stick .leg2{position:absolute;left:83px;top:90px;width:7px;height:56px;background:#58666e;border-radius:99px;transform-origin:top}.stick .leg1{transform:rotate(28deg)}.stick .leg2{transform:rotate(-28deg)}.hintbox{border:3px dashed #9dd3f1;border-radius:24px;background:#f4fbff;padding:12px;margin:10px auto;max-width:620px}.write-board{width:min(820px,95vw);height:min(390px,48dvh);background:white;border:4px solid #8cc8f4;border-radius:28px;position:relative;margin:8px auto;overflow:hidden}.write-cells{position:absolute;inset:0;display:grid}.write-cell{display:grid;place-items:center;border-right:2px solid #d5e8f8;position:relative}.write-cell:before,.write-cell:after{content:"";position:absolute;background:#d5e8f8;opacity:.8}.write-cell:before{left:50%;top:0;width:2px;height:100%}.write-cell:after{left:0;top:50%;height:2px;width:100%}.write-cell span{font-size:clamp(118px,22vw,210px);font-weight:1000;color:rgba(57,65,72,.15);z-index:1;line-height:1}.write-cell.sentence span{font-size:clamp(50px,9vw,92px)}.write-board canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.keyboard{display:grid;grid-template-columns:repeat(10,1fr);gap:7px;width:min(880px,95vw);margin:8px auto;background:#eef3f6;border-radius:22px;padding:10px}.key{min-height:52px;padding:6px;background:white;border-radius:14px;box-shadow:0 5px 0 #d8e0e5;font-size:clamp(20px,3vw,32px)}.key.wide{grid-column:span 3}.key.space{grid-column:span 4}.key.enter{background:var(--mint)}.key.del{background:#ffc5d2;color:#b93650}.inputline{min-height:74px;width:min(760px,94vw);border:4px dashed #ff9dba;background:#fff7fa;border-radius:22px;margin:6px auto 10px;padding:10px;font-size:clamp(34px,6vw,58px);font-weight:1000;text-align:center}.drop-zone{display:inline-flex;align-items:center;justify-content:center;min-width:150px;height:72px;border:4px dashed #ff9dba;border-radius:22px;background:#fff4f7;color:#ff74a0;font-size:36px;font-weight:1000}.audio{width:min(520px,90vw);margin:8px auto;display:block}@media(max-width:760px){.app{padding:8px}.top{height:84px}.brand-small{font-size:12px}.main-title{font-size:30px}.bookline{font-size:12px;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.malangi span.label{display:none}.screen{height:calc(100dvh - 102px);padding:5px 3px 50px}.grid3,.grid2{grid-template-columns:1fr;gap:9px}.bigmenu{height:116px}.bigmenu .emoji{font-size:27px}.bigmenu .name{font-size:30px}.bigmenu .desc{font-size:15px}.card{padding:10px;border-radius:24px}.scene{height:105px}.choice{min-height:57px}h1{ /* v7 draggable lane game */
.lane-game{width:min(820px,92vw);height:300px;margin:8px auto 6px;position:relative;border-radius:28px;overflow:hidden;background:linear-gradient(#BFE8FF 0 30%,#5A5D60 30% 100%);border:5px solid #DDEDF4;touch-action:none}
.lane-word{position:absolute;top:108px;height:84px;display:flex;align-items:center;justify-content:center;color:white;font-weight:1000;font-size:clamp(26px,4vw,44px);text-shadow:0 3px 0 rgba(0,0,0,.22);border-left:4px dashed rgba(255,255,255,.75)}
.lane-word:first-child{border-left:0}
.lane-car{position:absolute;top:22px;left:calc(50% - 38px);width:76px;height:52px;border-radius:18px 18px 12px 12px;background:#FFD45A;box-shadow:0 8px 0 rgba(0,0,0,.18);cursor:grab;touch-action:none;z-index:5}
.lane-car:before{content:"";position:absolute;left:16px;top:8px;width:44px;height:18px;border-radius:12px 12px 5px 5px;background:#FFF8D7}
.lane-car:after{content:"☁";position:absolute;left:23px;top:16px;font-size:24px}
.lane-car.dragging{cursor:grabbing;transform:scale(1.05)}
.lane-target{position:absolute;bottom:10px;height:110px;border-left:4px dashed rgba(255,255,255,.35)}
.lane-target:first-child{border-left:0}
.lane-guide{display:none}
@media(max-width:760px){.lane-game{height:260px}.lane-word{top:92px;height:74px}.lane-car{width:66px;height:46px;top:18px;left:calc(50% - 33px)}}


.lane-word.hint-correct{
  animation: laneHintBlink .65s infinite alternate;
  background:rgba(255,232,168,.38);
  border-radius:18px;
}
@keyframes laneHintBlink{
  from{filter:brightness(1); transform:scale(1);}
  to{filter:brightness(1.25); transform:scale(1.06);}
}


.picture-choices{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:min(880px,94vw);margin:10px auto}
.pic-card{background:#fff;border:4px solid var(--line);border-radius:28px;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 0 rgba(70,105,120,.12)}
.pic-card .label{font-size:clamp(18px,2.4vw,26px);font-weight:1000;color:#4e5b63}
.pic-card.correct{background:var(--green);border-color:#9DDFAD}
.pic-card.wrong{background:var(--pink);border-color:#FFADC9}
@media(max-width:760px){
  .hero{padding:20px 14px;width:96vw}
  .picture-choices{grid-template-columns:1fr;gap:8px}
  .pic-card{min-height:105px;flex-direction:row}
}


.malangi.need-help{
  animation: malangiPulse .7s infinite alternate;
  border-color:#FF9DC0;
  background:#FFF0F6;
}
@keyframes malangiPulse{
  from{transform:scale(1); box-shadow:0 5px 0 var(--shadow);}
  to{transform:scale(1.06); box-shadow:0 8px 18px rgba(255,130,170,.32);}
}
@media(max-width:760px){
  .malangi span.label{display:inline;font-size:12px;max-width:78px;line-height:1.1}
}


/* v14 clearer icons and fishing game */
.bed{width:155px;height:100px;background:#CFE8FF;border-radius:22px;position:relative;border:6px solid #A7D7F4}
.bed:before{content:"";position:absolute;left:14px;top:18px;width:48px;height:42px;border-radius:14px;background:#FFF8D7}
.bed:after{content:"";position:absolute;left:58px;top:42px;width:82px;height:40px;border-radius:14px;background:#B6D7FF}
.waterdrop{width:96px;height:130px;background:linear-gradient(#BFE8FF,#58BCEB);border-radius:55% 55% 60% 60%;transform:rotate(45deg);position:relative}
.waterdrop:after{content:"";position:absolute;left:20px;top:22px;width:26px;height:16px;border-radius:50%;background:rgba(255,255,255,.75)}
.lowbattery{width:150px;height:82px;border:8px solid #9AA8AF;border-radius:18px;position:relative;background:#F4F8FA}
.lowbattery:before{content:"";position:absolute;right:-20px;top:21px;width:12px;height:28px;border-radius:0 8px 8px 0;background:#9AA8AF}
.lowbattery:after{content:"";position:absolute;left:13px;top:14px;width:34px;height:40px;border-radius:8px;background:#FF9DBA}
.fish-game{width:min(860px,94vw);height:330px;background:linear-gradient(#BFE8FF 0 26%,#73C9F0 26% 100%);border:5px solid #DDEDF4;border-radius:30px;position:relative;overflow:hidden;margin:auto;touch-action:none}
.rod{position:absolute;left:18px;top:25px;width:180px;height:8px;background:#8B6A45;border-radius:99px;transform:rotate(-8deg);transform-origin:left}
.rod:after{content:"";position:absolute;right:0;top:5px;width:3px;height:145px;background:#6B7B83}
.hook{position:absolute;left:190px;top:170px;font-size:34px;z-index:3;transition:.25s}
.fish{position:absolute;width:150px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:1000;background:#FFF8D7;border:4px solid #fff;box-shadow:0 8px 0 rgba(0,0,0,.12);cursor:grab;touch-action:none}
.fish:after{content:"";position:absolute;right:-28px;width:0;height:0;border-top:22px solid transparent;border-bottom:22px solid transparent;border-left:34px solid #FFF8D7}
.fish.dragging{transform:scale(1.05)}
.fish-target{position:absolute;left:45px;top:158px;width:120px;height:120px;border:5px dashed rgba(255,255,255,.8);border-radius:50%;display:grid;place-items:center;color:white;font-weight:1000;font-size:22px}
.choice-hint-icon{display:inline-grid;place-items:center;margin-left:10px;vertical-align:middle;width:60px;height:46px}
.choice-hint-icon > div{transform:scale(.38)}
.choice.hint-correct{animation: laneHintBlink .65s infinite alternate;background:rgba(255,232,168,.38)}
@media(max-width:760px){
  .fish-game{height:270px}
  .fish{width:115px;height:60px;font-size:24px}
  .fish-target{width:95px;height:95px;left:25px;top:138px}
  .rod{width:145px}.hook{left:150px;top:148px}
}

function $(id){return document.getElementById(id)}function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');hideSpeech()}function speak(txt){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='ko-KR';u.rate=.82;u.pitch=1.05;speechSynthesis.speak(u)}function speakParts(parts){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();let delay=0;parts.forEach(p=>{setTimeout(()=>{const u=new SpeechSynthesisUtterance(p);u.lang='ko-KR';u.rate=.82;speechSynthesis.speak(u)},delay);delay+=Math.max(700,p.length*230)})}
function readBlankQuestion(q){
  const parts = q.split("[     ]");
  const first = (parts[0] || "").trim();
  const second = (parts[1] || "").trim();
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();

  const say = (text, delay) => {
    setTimeout(()=>{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ko-KR";
      u.rate = .82;
      u.pitch = 1.05;
      speechSynthesis.speak(u);
    }, delay);
  };

  let t = 0;
  if(first){ say(first, t); t += Math.max(520, first.length * 130); }
  t += 260;  // 빈칸 짧은 쉼
  if(second){ say(second, t); t += Math.max(520, second.length * 130); }
  say("빈칸에 들어갈 말을 찾아보세요.", t + 260);
}

function setupLaneDrag(){
 const car=$("laneCar"), game=$("laneGame");
 let dragging=false, offsetX=0, offsetY=0;
 const moveTo=(clientX,clientY)=>{
   const r=game.getBoundingClientRect();
   let x=clientX-r.left-offsetX, y=clientY-r.top-offsetY;
   x=Math.max(0,Math.min(r.width-car.offsetWidth,x));
   y=Math.max(0,Math.min(r.height-car.offsetHeight,y));
   car.style.left=x+"px"; car.style.top=y+"px";
 };
 car.onpointerdown=e=>{
   dragging=true; car.classList.add("dragging"); car.setPointerCapture(e.pointerId);
   const cr=car.getBoundingClientRect();
   offsetX=e.clientX-cr.left; offsetY=e.clientY-cr.top;
   e.preventDefault();
 };
 car.onpointermove=e=>{ if(!dragging)return; moveTo(e.clientX,e.clientY); e.preventDefault(); };
 car.onpointerup=e=>{
   dragging=false; car.classList.remove("dragging");
   const gr=game.getBoundingClientRect(), cr=car.getBoundingClientRect();
   const centerX=cr.left+cr.width/2-gr.left;
   const targets=[...document.querySelectorAll(".lane-target")];
   const hit=targets.find(t=>{
     const left=t.offsetLeft, right=left+t.offsetWidth;
     return centerX>=left && centerX<=right;
   });
   if(hit){
     const chosen=hit.dataset.answer, correct=car.dataset.correct;
     speak(chosen);
     setTimeout(()=>{
       if(chosen===correct) fb("맞아요. 잘했어요!");
       else wrong(correct);
     }, 850);
   }else{
     speak("차선 위에 올려 주세요.");
   }
   e.preventDefault();
 };
}

function drawTyped(){const text=composeJamo(typedJamo);$('inputLine').textContent=text||'입력'}function checkTyped(target){const text=composeJamo(typedJamo).replaceAll(' ','');if(!target){fb('입력했어요!');return}if(text===target.replaceAll(' ',''))fb('잘 입력했어요!');else wrong(target)}
function renderRecord(list,label){if(idx>=list.length)return finish();setProgress(list.length);const t=list[idx];$('body').innerHTML=`<h2>${esc(t)}</h2><div class="sub">${label}</div><div class="footer"><button onclick="speak('${esc(t)}')">🔊 듣기</button><button class="pink" onclick="startRec()">🎙️ 녹음 시작</button><button class="danger" onclick="stopRec()">⏹ 멈춤</button></div><audio id="audio" class="audio hidden" controls></audio><div class="footer"><button class="green" onclick="fb('녹음 완료!')">다 했어요</button></div>`;speakParts([t,'따라 말해 보세요.'])}function renderMind(){const prompts=['나는 무엇에 빠졌나요?','나는 언제 기운이 빠지나요?','나는 무엇을 목 빠지게 기다렸나요?'];if(idx>=prompts.length)return finish();setProgress(prompts.length);const p=prompts[idx];$('body').innerHTML=`<h2>${esc(p)}</h2><div class="sub">내 마음을 말하고 녹음해요</div><div class="footer"><button onclick="speak('${esc(p)}')">🔊 질문 듣기</button><button class="pink" onclick="startRec()">🎙️ 녹음 시작</button><button class="danger" onclick="stopRec()">⏹ 멈춤</button></div><audio id="audio" class="audio hidden" controls></audio><div class="footer"><button class="green" onclick="fb('내 마음 말하기 완료!')">다 했어요</button></div>`;speak(p)}function renderListenPick(){const list=CONTENT.readWords;if(idx>=list.length)return finish();setProgress(list.length);const target=list[idx];const it=CONTENT.words.find(x=>x.short===target)||CONTENT.words[idx];const choices=shuffle([target,...CONTENT.readWords.filter(x=>x!==target).slice(0,2)]);
 $("body").innerHTML=`<h2>잘 듣고 골라요</h2><div class="sub">소리를 듣고 같은 단어를 찾아요</div><div class="grid3">${choices.map(c=>`<button class="choice listen-choice" data-word="${esc(c)}" onclick="check(this,'${esc(c)}','${esc(target)}')"><span>${esc(c)}</span></button>`).join("")}</div><div class="footer"><button onclick="speak('${esc(target)}')">🔊 듣기</button><button onclick="showPicHint()">💡 힌트</button></div>`;
 window.listenHintWord=target; window.listenHintScene=it.scene;
 setTimeout(()=>speak(target),400);
}
function showPicHint(){
 const word=window.listenHintWord, sceneName=window.listenHintScene;
 const btn=[...document.querySelectorAll(".listen-choice")].find(b=>b.dataset.word===word);
 if(btn && !btn.querySelector(".choice-hint-icon")){
   btn.insertAdjacentHTML("beforeend", `<span class="choice-hint-icon"><div class="${sceneName}"></div></span>`);
   btn.classList.add("hint-correct");
   setTimeout(()=>btn.classList.remove("hint-correct"),5000);
 }
 speak("힌트를 볼까요?");
}
async function startRec(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});audioChunks=[];mediaRecorder=new MediaRecorder(stream);mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);mediaRecorder.onstop=()=>{const blob=new Blob(audioChunks,{type:'audio/webm'});const url=URL.createObjectURL(blob);const au=$('audio');au.src=url;au.classList.remove('hidden');stream.getTracks().forEach(t=>t.stop())};mediaRecorder.start();$('feedback').textContent='녹음 중...'}catch(e){$('feedback').textContent='마이크 권한을 허용해 주세요.'}}function stopRec(){if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.stop();$('feedback').textContent='내 목소리를 들어보세요.'}}
function isWritingTraceActivity(){return activity==='traceWord'||activity==='traceSentence'||activity==='traceFree'}
function writingStorageKey(a=activity){return WRITING_STORAGE_PREFIX+a}
function loadWritingRecords(a){
 try{
   const saved=JSON.parse(localStorage.getItem(writingStorageKey(a))||'[]');
   return Array.isArray(saved)?saved:[];
 }catch(_){return[]}
}
function persistWritingRecords(){
 try{localStorage.setItem(writingStorageKey(),JSON.stringify(writingRecords))}catch(_){}
}
function saveCurrentWriting(showFeedback=true){
 const canvas=$('draw');
 if(!canvas||!currentWritingLabel)return;
 const record={index:idx,label:currentWritingLabel,image:canvas.toDataURL('image/png')};
 const existing=writingRecords.findIndex(item=>item.index===idx);
 if(existing>=0)writingRecords[existing]=record;else writingRecords.push(record);
 writingRecords.sort((a,b)=>a.index-b.index);
 persistWritingRecords();
 if(showFeedback){
   $('feedback').textContent='끝까지 써 본 기록이에요.';
   speak('끝까지 써 본 기록이에요.');
 }
}
function completeWriting(label){currentWritingLabel=label;saveCurrentWriting(true)}
function renderWritingGallery(){
 const grid=$('writingGalleryGrid');
 if(!writingRecords.length){
   grid.innerHTML='<div class="writing-gallery-empty">아직 모아 둔 글씨가 없어요. 천천히 다시 써 봐요.</div>';
   return;
 }
 grid.innerHTML=writingRecords.map(record=>`<article class="writing-sample-card"><strong>${esc(record.label)}</strong><img src="${record.image}" alt="${esc(record.label)} 내가 쓴 글씨"></article>`).join('');
}
function showWritingGallery(){renderWritingGallery();show('writingGallery')}
function restartWriting(){
 try{localStorage.removeItem(writingStorageKey())}catch(_){}
 writingRecords=[];
 idx=0;
 currentWritingLabel='';
 show('play');
 render();
}
function printWritingGallery(){
 document.body.classList.add('writing-print');
 window.print();
}
window.addEventListener('afterprint',()=>document.body.classList.remove('writing-print'));
function setupCanvas(w,h){
 const c=$('draw');
 drawCtx=c.getContext('2d');
 drawCtx.lineWidth=14;
 drawCtx.lineCap='round';
 drawCtx.lineJoin='round';
 drawCtx.strokeStyle='#333c45';
 c.style.touchAction='none';
 c.style.userSelect='none';
 c.oncontextmenu=e=>e.preventDefault();
 const pos=e=>{const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*c.width/r.width,y:(e.clientY-r.top)*c.height/r.height}};
 const stop=e=>{if(!drawing)return;drawing=false;try{if(c.hasPointerCapture(e.pointerId))c.releasePointerCapture(e.pointerId)}catch(_){}e.preventDefault()};
 c.onpointerdown=e=>{
   if(e.button!==undefined&&e.button!==0)return;
   drawing=true;
   try{c.setPointerCapture(e.pointerId)}catch(_){}
   const p=pos(e);
   drawCtx.beginPath();
   drawCtx.moveTo(p.x,p.y);
   drawCtx.lineTo(p.x+.01,p.y+.01);
   drawCtx.stroke();
   e.preventDefault();
 };
 c.onpointermove=e=>{
   if(!drawing)return;
   const events=typeof e.getCoalescedEvents==='function'?e.getCoalescedEvents():[e];
   events.forEach(point=>{const p=pos(point);drawCtx.lineTo(p.x,p.y)});
   drawCtx.stroke();
   e.preventDefault();
 };
 c.onpointerup=stop;
 c.onpointercancel=stop;
 c.onlostpointercapture=()=>{drawing=false};
}function clearDraw(){if(drawCtx)drawCtx.clearRect(0,0,900,360)}
setTimeout(()=>{const direct=queryValue('activity');if(direct){document.body.classList.add('direct-activity');start(direct);return}location.replace('../')},80);
</script></body></html>
