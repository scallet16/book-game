<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>놀이 활동 - 빠질 때가 됐어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../../style.css">
  <script src="../../../script.js" defer></script>
</head>
<body>
  <div class="clouds"><span class="cloud one"></span><span class="cloud two"></span></div>
  <div class="page-shell">
    <header class="brand">
      <a class="brand-mark" href="../../../">
        <img src="../../../shared/images/yeni-teacher.png" alt="여니쌤 캐릭터">
        <span>수다쟁이 여니쌤의 뿜뿜 놀이터</span>
      </a>
      <button class="malangi-helper" type="button" data-malangi-message="그림과 말을 잘 보고 골라 봐." aria-label="말랑이 도움말 듣기">
        <span class="helper-bubble" aria-hidden="true"></span>
        <span class="helper-text">도움이 필요하면 눌러줘</span>
      </button>
    </header>
    <main class="main">
      <nav class="book-nav" aria-label="이동">
        <a class="back-link" href="../">책 활동 홈</a>
        <a class="back-link" href="../../../playgrounds/book/">책 놀이터로</a>
      </nav>
      <section class="section-title activity-list-title">
        <p class="kicker">『빠질 때가 됐어』</p>
        <h1>놀이 활동</h1>
      </section>
      <section class="activity-list-grid" aria-label="놀이 활동 목록">
        <a class="activity-list-card live-card" href="../activity/?section=game&activity=bubble"><span>🫧</span><strong>뜻 방울 톡톡</strong></a>
        <button class="activity-list-card live-card" type="button" data-soon-message="메모리 카드 같은 그림 찾기는 곧 만나요!"><span>🃏</span><strong>메모리 카드 같은 그림 찾기</strong></button>
        <a class="activity-list-card live-card" href="../activity/?section=game&activity=drive"><span>🚗</span><strong>말랑이 차선 찾기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=game&activity=dragBlank"><span>🧩</span><strong>문맥 빈칸 채우기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=game&activity=body"><span>🎭</span><strong>몸으로 표현하기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=game&activity=connect"><span>🔗</span><strong>뜻 연결하기</strong></a>
      </section>
      <p class="malangi-notice" data-soon-output aria-live="polite"></p>
    </main>
  </div>
</body>
</html>
