<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쓰기 활동 - 빠질 때가 됐어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../../style.css">
  <script src="../../../script.js" defer></script>
</head>
<body>
  <div class="clouds"><span class="cloud one"></span><span class="cloud two"></span></div>
  <div class="page-shell">
    <header class="brand">
      <a class="brand-mark" href="../../../">
        <img src="../../../shared/images/yeni-teacher.png" alt="여니쌤 캐릭터">
        <span>수다쟁이 여니쌤의 뿜뿜 놀이터</span>
      </a>
      <button class="malangi-helper" type="button" data-malangi-message="손가락으로 천천히 따라가 봐." aria-label="말랑이 도움말 듣기">
        <span class="helper-bubble" aria-hidden="true"></span>
        <span class="helper-text">도움이 필요하면 눌러줘</span>
      </button>
    </header>
    <main class="main">
      <nav class="book-nav" aria-label="이동">
        <a class="back-link" href="../">책 활동 홈</a>
        <a class="back-link" href="../../../playgrounds/book/">책 놀이터로</a>
      </nav>
      <section class="section-title activity-list-title">
        <p class="kicker">『빠질 때가 됐어』</p>
        <h1>쓰기 활동</h1>
      </section>
      <section class="activity-list-grid" aria-label="쓰기 활동 목록">
        <a class="activity-list-card live-card" href="../activity/?section=write&activity=traceWord"><span>☝️</span><strong>큰 글씨 따라쓰기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=write&activity=syllablePick"><span>가</span><strong>같은 음절 찾기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=write&activity=traceFree"><span>✏️</span><strong>낱말 따라쓰기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=write&activity=keyboardWord"><span>⌨️</span><strong>키보드 입력하기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=write&activity=traceSentence"><span>▢</span><strong>문장 칸 쓰기</strong></a>
        <a class="activity-list-card live-card" href="../activity/?section=write&activity=traceSentence"><span>📝</span><strong>바탕글씨 따라쓰기</strong></a>
      </section>
    </main>
  </div>
</body>
</html>
