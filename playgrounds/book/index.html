<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>책 놀이터 - 수다쟁이 여니쌤의 뿜뿜 놀이터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../script.js" defer></script>
</head>
<body>
  <div class="clouds">
    <span class="cloud one"></span>
    <span class="cloud two"></span>
  </div>
  <div class="stars"><span class="star">★</span><span class="star">★</span><span class="star">★</span></div>
  <div class="page-shell">
    <header class="brand">
      <a class="brand-mark" href="../../">
        <img src="../../shared/images/yeni-teacher.png" alt="여니쌤 캐릭터">
        <span>수다쟁이 여니쌤의 뿜뿜 놀이터</span>
      </a>
      <button class="malangi-helper" type="button" data-malangi-message="읽고 싶은 책을 하나 골라 봐." aria-label="말랑이 도움말 듣기">
        <span class="helper-bubble" aria-hidden="true"></span>
        <span class="helper-text">도움이 필요하면 눌러줘</span>
      </button>
    </header>
    <main class="main">
      <div class="section-head">
        <div class="section-title">
          <p class="kicker">책 놀이터</p>
          <h1>책을 읽고 표현해요</h1>
        </div>
        <a class="back-link" href="../../">메인으로</a>
      </div>
      <section class="book-list">
        <a class="book-card" href="../../books/ppajida/">
          <span class="badge">바로 하기</span>
          <strong>빠질 때가 됐어</strong>
          <small>읽고, 말하고, 쓰고, 몸으로 표현하는 책 활동입니다.</small>
        </a>
        <article class="book-card">
          <span class="badge">곧 만나요!</span>
          <strong>새 책 활동</strong>
          <small>책의 핵심 개념에 맞는 활동으로 다음 단계에서 추가됩니다.</small>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
